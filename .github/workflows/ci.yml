name: CI

on:
  push:
    branches: [main, develop, feature/ci]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install hatch
        run: pipx install hatch
      - name: ruff check
        run: hatch run dev:lint
      - name: ruff format --check
        run: hatch run dev:format-check

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install hatch
        run: pipx install hatch
      - name: mypy
        run: hatch run dev:typecheck

  test:
    name: Test (hatch matrix)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: |
            3.11
            3.12
          cache: pip
      - name: Install hatch
        run: pipx install hatch
      - name: Run tests on all Python versions
        run: hatch test --all
